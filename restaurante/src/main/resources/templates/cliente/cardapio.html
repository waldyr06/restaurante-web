<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio - O Nosso Restaurante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<!-- Cabeçalho -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-shop me-2"></i>Dobradinha e Feijoada da Irmã Marcela
        </a>
        <!-- Botão do Carrinho -->
        <a th:href="@{/cardapio/resumo}" class="btn btn-warning position-relative">
            <i class="bi bi-cart-fill"></i> Carrinho
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-dark" th:text="${#lists.size(carrinho)}">
                0
            </span>
        </a>
    </div>
</nav>

<!-- Conteúdo Principal -->
<div class="container mt-5 mb-5">

    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-dark">O Nosso Cardápio</h1>
        <p class="lead text-muted">Escolha os seus pratos, frescos e feitos na hora.</p>
    </div>

    <div class="row g-4">

        <!-- O Loop do Thymeleaf: Para cada prato, cria uma coluna (col) -->
        <!-- col-12 = 1 por linha no telemóvel | col-md-6 = 2 por linha num tablet | col-lg-4 = 3 por linha no PC -->
        <div class="col-12 col-md-6 col-lg-4" th:each="item : ${produtos}">

            <!-- O Cartão -->
            <div class="card h-100 shadow-sm border-0">

                <!-- Corpo do Cartão -->
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h4 class="card-title text-danger fw-bold mb-0" th:text="${item.name}">Nome do Prato</h4>
                        <span class="badge bg-success fs-6" th:text="'R$ ' + ${item.price}">R$ 0.00</span>
                    </div>

                    <p class="card-text text-muted flex-grow-1 mt-2" th:text="${item.description}">
                        Descrição do parto aqui.
                    </p>
                </div>

                <!-- Rodapé do Cartão com o Botão de Adicionar -->
                <div class="card-footer bg-white border-top-0 p-3 pt-0">
                    <a th:href="@{/cardapio/adicionar/{id}(id=${item.id})}" class="btn btn-outline-danger w-100 fw-bold">
                        <i class="bi bi-plus-circle me-1"></i> Adicionar ao Pedido
                    </a>
                </div>

            </div>

        </div>
        <!-- Fim do Loop do Thymeleaf -->

    </div>

    <!-- Mensagem caso o cardápio esteja vazio-->
    <div th:if="${#lists.isEmpty(produtos)}" class="alert alert-warning text-center mt-4">
        <i class="bi bi-emoji-frown fs-4 d-block mb-2"></i>
        De momento, não temos pratos ativos no cardápio. Volte mais tarde!
    </div>

</div>

</body>
</html>
