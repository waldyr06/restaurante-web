<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Prato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- Início do Card -->
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h3 class="mb-0">Formulário de Prato</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/produtos/salvar}" method="POST">

                        <!--Aqui tô  deixando o id invisível para o cliente-->
                        <input type="hidden" name="id" th:value="${produto?.id}" />

                        <!-- Campo: Nome -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome do prato</label>
                            <input type="text" class="form-control" name="name" th:value="${produto?.name}" required/>
                        </div>

                        <!-- Campo: Descrição -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Descrição do prato</label>
                            <input type="text" class="form-control" name="description" th:value="${produto?.description}" required/>
                        </div>

                        <!-- Campo: Preço -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Preço (R$)</label>
                            <input type="number" step="0.01" class="form-control" name="price" th:value="${produto?.price}" required/>
                        </div>

                        <!-- Campo: Status -->
                        <div class="form-check mb-4">
                            <!-- th:checked é o que faz a caixinha vir marcada se for true no banco -->
                            <input class="form-check-input" type="checkbox" name="active" value="true" th:checked="${produto?.active}" id="statusCheck"/>
                            <label class="form-check-label" for="statusCheck">
                                Prato Ativo (Aparece no cardápio do cliente)
                            </label>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a th:href="@{/admin/produtos/lista}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">Salvar Prato</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
